name: CI/CD - Build y Deploy

on:
  push:
    branches: [main]

jobs:
  build-backend:
    name: Build y verificar API .NET 8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restaurar dependencias
        run: dotnet restore backend/StudentEnrollment.API/StudentEnrollment.API.csproj

      - name: Compilar
        run: dotnet build backend/StudentEnrollment.API/StudentEnrollment.API.csproj --no-restore --configuration Release

      - name: Publicar artefacto
        run: dotnet publish backend/StudentEnrollment.API/StudentEnrollment.API.csproj --configuration Release --output ./publish/api --no-restore

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: api-artifact
          path: ./publish/api

  build-frontend:
    name: Build Angular Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Compilar produccion
        working-directory: frontend
        run: npx ng build --configuration production

      - name: Subir artefacto frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-artifact
          path: frontend/dist/frontend/browser/

  # Railway redeploya automaticamente desde el push a main.
  # Este job solo valida que el build de Docker funciona correctamente.
  verify-docker:
    name: Verificar build Docker
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - uses: actions/checkout@v4

      - name: Build imagen Docker
        run: docker build -t inscripcion-estudiantil:ci .
