<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-card__header">
      <span class="auth-card__icon">🎓</span>
      <h1 class="auth-card__title">Iniciar sesión</h1>
      <p class="auth-card__subtitle">Sistema de Registro y Matrícula</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form" novalidate>
      @if (errorMsg()) {
        <div class="alert alert--error">{{ errorMsg() }}</div>
      }

      <div class="form-group">
        <label for="email" class="form-label">Correo electrónico</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="form-control"
          [class.form-control--error]="invalid('email')"
          placeholder="estudiante@universidad.edu"
          autocomplete="email"
        />
        @if (invalid('email')) {
          <span class="form-error">Ingresa un correo electrónico válido.</span>
        }
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="form-control"
          [class.form-control--error]="invalid('password')"
          placeholder="••••••••"
          autocomplete="current-password"
        />
        @if (invalid('password')) {
          <span class="form-error">La contraseña debe tener al menos 6 caracteres.</span>
        }
      </div>

      <button
        type="submit"
        class="btn btn--primary btn--full"
        [disabled]="loading()"
      >
        @if (loading()) { Verificando… } @else { Ingresar }
      </button>
    </form>

    <p class="auth-card__footer">
      ¿No tienes cuenta?
      <a routerLink="/auth/registro">Regístrate aquí</a>
    </p>
  </div>
</div>
