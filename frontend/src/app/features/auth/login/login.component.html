<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-card__header">
      <img src="assets/logo.png" alt="Logo" class="auth-card__logo" />
      <h1 class="auth-card__title">Iniciar sesión</h1>
      <p class="auth-card__subtitle">Sistema de Registro y Matrícula</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form" novalidate>
      @if (errorMsg()) {
        <div class="alert alert--error">{{ errorMsg() }}</div>
      }

      <div class="form-group">
        <label for="email" class="form-label">Correo electrónico</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="form-control"
          [class.form-control--error]="invalid('email')"
          placeholder="estudiante@universidad.edu"
          autocomplete="email"
        />
        @if (invalid('email')) {
          <span class="form-error">Ingresa un correo electrónico válido.</span>
        }
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Contraseña</label>
        <div class="input-password-wrapper">
          <input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            formControlName="password"
            class="form-control"
            [class.form-control--error]="invalid('password')"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="password-toggle"
            (click)="togglePassword()"
            [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Ver contraseña'"
          >
            @if (showPassword()) {
              <!-- ojo tachado -->
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            } @else {
              <!-- ojo abierto -->
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            }
          </button>
        </div>
        @if (invalid('password')) {
          <span class="form-error">La contraseña debe tener al menos 6 caracteres.</span>
        }
      </div>

      <button
        type="submit"
        class="btn btn--primary btn--full"
        [disabled]="loading()"
      >
        @if (loading()) { Verificando… } @else { Ingresar }
      </button>
    </form>

    <p class="auth-card__footer">
      ¿No tienes cuenta?
      <a routerLink="/auth/registro">Regístrate aquí</a>
    </p>
  </div>
</div>
